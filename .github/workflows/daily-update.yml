name: Daily Update
on:
  schedule:
    - cron: "0 10 * * *"
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install pandas numpy akshare
      - name: Run CI pipeline
        run: python ci_pipeline.py
      - name: Build HTML
        run: python build_html.py --realtime
      - name: Patch HTML
        run: python patch_html.py
      - name: Deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          cp outputs/index.html index.html 2>/dev/null || true
          git add index.html outputs/
          git diff --staged --quiet || (git commit -m "Auto $(TZ='Asia/Shanghai' date +%m/%d-%H:%M)" && git push)